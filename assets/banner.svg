<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Ambient glow top-left -->
  <ellipse cx="200" cy="200" rx="300" ry="200" fill="#1d4ed8" opacity="0.08"/>
  <!-- Ambient glow bottom-right -->
  <ellipse cx="1100" cy="460" rx="280" ry="180" fill="#f97316" opacity="0.06"/>

  <!-- Icon group (left side, centered vertically) -->
  <g transform="translate(160, 220)">
    <!-- Icon background pill -->
    <rect x="-20" y="-20" width="200" height="200" rx="32" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5" opacity="0.8"/>

    <!-- Container block -->
    <rect x="20" y="44" width="120" height="72" rx="10" fill="url(#blue)" filter="url(#glow)" opacity="0.9"/>

    <!-- Git lines -->
    <g stroke="#bfdbfe" stroke-width="3.5" stroke-linecap="round" fill="none">
      <line x1="80" y1="14" x2="80" y2="146"/>
      <line x1="80" y1="80" x2="46" y2="100"/>
      <line x1="80" y1="80" x2="114" y2="100"/>
    </g>

    <!-- Nodes -->
    <circle cx="80" cy="80" r="8" fill="url(#orange)" filter="url(#softglow)"/>
    <circle cx="46" cy="100" r="6" fill="#60a5fa" filter="url(#softglow)"/>
    <circle cx="114" cy="100" r="6" fill="#60a5fa" filter="url(#softglow)"/>
  </g>

  <!-- dcli wordmark -->
  <text
    x="420"
    y="310"
    font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace"
    font-size="148"
    font-weight="700"
    letter-spacing="-4"
    fill="white"
    filter="url(#softglow)"
  >dcli</text>

  <!-- Tagline -->
  <text
    x="422"
    y="378"
    font-family="'Inter', 'SF Pro Display', '-apple-system', 'Helvetica Neue', sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="1"
    fill="#94a3b8"
  >Docker Compose &amp; Git management CLI</text>

  <!-- Feature pills -->
  <!-- Docker pill -->
  <g transform="translate(422, 412)">
    <rect width="148" height="36" rx="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="74" y="23" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="middle" letter-spacing="0.5">docker compose</text>
  </g>

  <!-- Git pill -->
  <g transform="translate(582, 412)">
    <rect width="92" height="36" rx="18" fill="#2d1f0f" stroke="#f97316" stroke-width="1"/>
    <text x="46" y="23" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="600" fill="#fb923c" text-anchor="middle" letter-spacing="0.5">git reset</text>
  </g>

  <!-- Go pill -->
  <g transform="translate(686, 412)">
    <rect width="72" height="36" rx="18" fill="#0c2a1f" stroke="#34d399" stroke-width="1"/>
    <text x="36" y="23" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="600" fill="#34d399" text-anchor="middle" letter-spacing="0.5">go</text>
  </g>

  <!-- Terminal prompt line (bottom right corner) -->
  <text
    x="1240"
    y="590"
    font-family="'SF Mono', 'Fira Code', monospace"
    font-size="15"
    fill="#334155"
    text-anchor="end"
  >github.com/oleg-koval/dcli</text>

  <!-- Decorative terminal lines top-right -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="14" fill="#1e3a5f">
    <text x="980" y="200">$ dcli docker clean --all</text>
    <text x="980" y="226" fill="#0f3a1a">✓ Stopped: api, worker, db</text>
    <text x="980" y="262">$ dcli git reset develop</text>
    <text x="980" y="288" fill="#0f3a1a">✓ Reset 3 repositories</text>
    <text x="980" y="324">$ dcli docker restart</text>
    <text x="980" y="350" fill="#0f3a1a">✓ Started: api, worker, db</text>
  </g>

  <!-- Cursor blink -->
  <rect x="980" y="362" width="9" height="18" rx="1" fill="#3b82f6" opacity="0.7"/>
</svg>
