<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Primary blue -->
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Accent -->
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>

  <!-- Container block (Docker abstraction) -->
  <rect x="64" y="88" width="128" height="80" rx="12" fill="url(#blue)"/>

  <!-- Git structure (clean geometry) -->
  <g stroke="#bfdbfe" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- vertical -->
    <line x1="128" y1="56" x2="128" y2="200"/>

    <!-- left branch -->
    <line x1="128" y1="120" x2="88" y2="140"/>

    <!-- right branch -->
    <line x1="128" y1="120" x2="168" y2="140"/>
  </g>

  <!-- Nodes -->
  <circle cx="128" cy="120" r="8" fill="url(#orange)"/>
  <circle cx="88" cy="140" r="6" fill="#60a5fa"/>
  <circle cx="168" cy="140" r="6" fill="#60a5fa"/>

</svg>
