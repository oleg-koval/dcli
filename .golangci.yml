version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  enable:
    - gosec
    - errcheck
    - staticcheck
    - ineffassign
    - typecheck
    - exhaustive
    - gosimple
    - exhaustive

  settings:
    gosec:
      severity: medium
      confidence: medium

  exclusions:
    rules:
      - path: "_test.go$"
        linters:
          - gosec
