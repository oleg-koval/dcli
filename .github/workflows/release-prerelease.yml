name: Release (prerelease)

# Publishes beta/alpha builds from the `beta` branch. Tags are semver prereleases
# (e.g. v0.2.0-beta.42+shortsha) so GoReleaser `prerelease: auto` marks the GitHub
# release as a prerelease. Homebrew is skipped; install from GitHub release assets
# or build from source.
on:
  push:
    branches:
      - beta

permissions:
  contents: write
  packages: write

jobs:
  test-gate:
    name: Verify Tests and Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test -v -covermode=atomic ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0

  release:
    needs: test-gate
    name: Create prerelease with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Compose prerelease version
        id: version
        run: |
          BASE="$(awk -F'"' '/^[[:space:]]*Version[[:space:]]*=/ {print $2; exit}' cmd/root.go)"
          if [ -z "$BASE" ]; then
            echo "::error::Could not read Version from cmd/root.go"
            exit 1
          fi
          SHORT="$(git rev-parse --short HEAD)"
          VERSION="v${BASE}-beta.${GITHUB_RUN_NUMBER}+${SHORT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing prerelease ${VERSION}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=validate --skip=brew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}
