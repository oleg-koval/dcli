name: Release

'on':
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-gate:
    name: Verify Tests and Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test -v -covermode=atomic ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  release:
    needs: test-gate
    name: Create Release with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Determine next semver tag
        id: version
        run: |
          set -eu
          LATEST="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)"
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest stable tag: ${LATEST}"

          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            NEW_COMMITS="$(git rev-list --count "${LATEST}..HEAD" 2>/dev/null || echo 1)"
            if [ "$NEW_COMMITS" -eq 0 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "No new commits since ${LATEST}; skipping release."
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

          MAJOR="$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)"
          MINOR="$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)"
          PATCH="$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)"

          # Determine bump from conventional commit subjects since last stable tag
          if git rev-parse "$LATEST" >/dev/null 2>&1; then
            SUBJECTS="$(git log "${LATEST}..HEAD" --pretty=format:'%s')"
          else
            SUBJECTS="$(git log --pretty=format:'%s')"
          fi

          if echo "$SUBJECTS" | grep -qiE '(BREAKING CHANGE|^[a-z]+(\(.+\))?!:)'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$SUBJECTS" | grep -qiE '^feat(\(.+\))?:'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${VERSION}"

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        run: |
          set -eu
          TAG="${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Bump the version or check commit history."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Run GoReleaser
        if: steps.version.outputs.skip != 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
