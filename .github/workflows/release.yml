name: Release

# Publish only when a semver tag is pushed (e.g. v0.2.0). Do not derive the
# release version from `git describe`: that produced pseudo-tags like
# v0.1.0-27-gabc1234, which were then tagged again and chained into unusable names.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  test-gate:
    name: Verify Tests and Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -v -covermode=atomic ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0

  release:
    needs: test-gate
    name: Create Release with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
