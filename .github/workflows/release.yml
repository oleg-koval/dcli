name: Release

# Run on every merge to main. Version = cmd/root.go `Version` + semver build metadata
# (+<git short sha>) so each release is unique without using `git describe` (which
# produced chained pseudo-tags when those strings were published as tags).
# No path filter: doc-only or config-only merges still need a release when you ship main.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  test-gate:
    name: Verify Tests and Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -v -covermode=atomic ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0

  release:
    needs: test-gate
    name: Create Release with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Compose release version
        id: version
        run: |
          BASE="$(awk -F'"' '/^[[:space:]]*Version[[:space:]]*=/ {print $2; exit}' cmd/root.go)"
          if [ -z "$BASE" ]; then
            echo "::error::Could not read Version from cmd/root.go"
            exit 1
          fi
          SHORT="$(git rev-parse --short HEAD)"
          VERSION="v${BASE}+${SHORT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${VERSION}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.version }}
